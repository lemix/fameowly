services:
  family-ai-hub:
    build: .
    container_name: family-ai-hub
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ai-hub-data:/app/data
      # Optionally mount a custom models config:
      # - ./data/models.json:/app/data/models.json:ro
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production

volumes:
  ai-hub-data:
